<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Warrior I Coach</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');
    :root {
      --bg: #120a0a; --surface: #1a1111; --orange: #ff7c38;
      --orange-dim: #5c2a1a; --red: #ff4f4f; --text: #edd9d4; --muted: #705050;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding: 24px 16px;
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif; font-size: 3rem;
      letter-spacing: 0.12em; color: var(--orange);
      text-shadow: 0 0 30px rgba(255,124,56,0.35); margin-bottom: 4px;
    }
    .subtitle {
      color: var(--muted); font-size: 0.85rem;
      letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 20px;
    }
    .arena {
      position: relative; width: 700px; max-width: 100%;
      border-radius: 16px; overflow: hidden;
      border: 1px solid var(--orange-dim);
      box-shadow: 0 0 60px rgba(255,124,56,0.08);
    }
    video#webcam { display: none; }
    canvas#canvas { display: block; width: 100%; height: auto; transform: scaleX(-1); }
    #overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(18,10,10,0.93));
      padding: 32px 24px 20px; font-size: 1.3rem; font-weight: 500;
      color: var(--orange); text-shadow: 0 0 12px rgba(255,124,56,0.5);
      min-height: 70px; display: flex; align-items: flex-end;
    }
    .hud {
      display: flex; justify-content: space-between;
      width: 700px; max-width: 100%; margin-top: 14px; gap: 12px;
    }
    .hud-card {
      flex: 1; background: var(--surface);
      border: 1px solid var(--orange-dim); border-radius: 10px; padding: 12px 18px;
    }
    .hud-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 4px; }
    .hud-value { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--orange); letter-spacing: 0.05em; }
    #cam-btn {
      margin-top: 18px; background: var(--orange); color: #120a0a;
      border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif;
      font-weight: 500; font-size: 1rem; padding: 12px 32px;
      cursor: pointer; letter-spacing: 0.04em; transition: opacity 0.2s;
    }
    #cam-btn:hover { opacity: 0.85; }
    #cam-btn:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>
  <h1>Warrior I Coach</h1>
  <p class="subtitle">Virabhadrasana I — Real-time Pose Guidance</p>

  <div class="arena">
    <video id="webcam" playsinline></video>
    <canvas id="canvas"></canvas>
    <div id="overlay">Click Start Webcam to begin</div>
  </div>

  <div class="hud">
    <div class="hud-card"><div class="hud-label">Step</div><div class="hud-value" id="progress">1 / 4</div></div>
    <div class="hud-card"><div class="hud-label">Status</div><div class="hud-value" id="score">–</div></div>
  </div>
  <button id="cam-btn">Start Webcam</button>

  <script>
    window.onerror = function(msg) {
      document.getElementById("overlay").innerText = msg || "Error occurred";
    };

    document.getElementById("cam-btn").addEventListener("click", () => {
      document.getElementById("cam-btn").disabled = true;
      document.getElementById("cam-btn").innerText = "Camera Active";
      initializeApp();
    });

    async function initializeApp() {
      const video  = document.getElementById("webcam");
      const canvas = document.getElementById("canvas");
      const ctx    = canvas.getContext("2d");
      canvas.width = 700; canvas.height = 520;

      const overlay   = document.getElementById("overlay");
      const progress  = document.getElementById("progress");
      const scoreText = document.getElementById("score");

      const HOLD_TIME = 4000;
      let state = "stance", holdStart = 0;

      const LM = {
        NOSE:0, L_SHOULDER:11, R_SHOULDER:12,
        L_ELBOW:13, R_ELBOW:14, L_WRIST:15, R_WRIST:16,
        L_HIP:23, R_HIP:24, L_KNEE:25, R_KNEE:26, L_ANKLE:27, R_ANKLE:28
      };

      function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }
      function speak(t){ try{ speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }catch(e){} }
      function angle(A,B,C){
        let r = Math.atan2(C.y-B.y,C.x-B.x) - Math.atan2(A.y-B.y,A.x-B.x);
        let a = Math.abs(r*180/Math.PI);
        return a>180?360-a:a;
      }

      function checkWarrior1(lm){
        if(!lm||lm.length<29) return {};

        // Wide stance: feet spread apart
        const wideStance = Math.abs(lm[LM.L_ANKLE].x - lm[LM.R_ANKLE].x) > 0.25;

        // Front knee (left) bent ~90 degrees
        const frontKneeAngle = angle(lm[LM.L_HIP], lm[LM.L_KNEE], lm[LM.L_ANKLE]);
        const frontKneeBent  = frontKneeAngle < 130 && lm[LM.L_KNEE].y > lm[LM.L_HIP].y;

        // Back leg (right) straight
        const backLegAngle    = angle(lm[LM.R_HIP], lm[LM.R_KNEE], lm[LM.R_ANKLE]);
        const backLegStraight = backLegAngle > 150;

        // Hips squared forward: both hips similar x position
        const hipsFacing = Math.abs(lm[LM.L_HIP].x - lm[LM.R_HIP].x) < 0.2;

        // Arms raised overhead
        const armsUp = lm[LM.L_WRIST].y < lm[LM.L_SHOULDER].y - 0.05 &&
                       lm[LM.R_WRIST].y < lm[LM.R_SHOULDER].y - 0.05;

        // Torso upright
        const torsoUpright = lm[LM.NOSE].y < lm[LM.L_HIP].y &&
                              Math.abs(lm[LM.NOSE].x - lm[LM.L_HIP].x) < 0.22;

        // Shoulders relaxed
        const shouldersRelaxed = lm[LM.L_SHOULDER].y > lm[LM.NOSE].y &&
                                  lm[LM.R_SHOULDER].y > lm[LM.NOSE].y;

        return { wideStance, frontKneeBent, backLegStraight, hipsFacing, armsUp, torsoUpright, shouldersRelaxed };
      }

      function coach(lm){
        const r = checkWarrior1(lm);
        const steps = { stance:1, frontKnee:2, backLeg:3, arms:4, hold:4, done:4 };
        progress.innerText = (steps[state]||1) + " / 4";

        if(!r.torsoUpright)     { overlay.innerText = "Stand tall — keep torso upright"; return; }
        if(!r.shouldersRelaxed) { overlay.innerText = "Relax your shoulders down"; return; }

        if(state==="stance"){
          overlay.innerText = "Step feet wide apart into a lunge";
          if(r.wideStance){ state="frontKnee"; speak("Good. Bend your front knee."); }

        } else if(state==="frontKnee"){
          overlay.innerText = "Bend front knee toward 90°";
          if(r.frontKneeBent){ state="backLeg"; speak("Great. Now straighten your back leg."); }

        } else if(state==="backLeg"){
          overlay.innerText = "Straighten and press back leg firm";
          if(r.backLegStraight){ state="arms"; speak("Perfect. Raise both arms overhead."); }

        } else if(state==="arms"){
          overlay.innerText = "Raise arms overhead — palms together";
          if(r.armsUp){ state="hold"; holdStart=Date.now(); speak("Warrior One! Hold strong."); }

        } else if(state==="hold"){
          const elapsed = Date.now()-holdStart;
          const remain  = Math.ceil((HOLD_TIME-elapsed)/1000);

          // Live corrections while holding
          if(!r.frontKneeBent)   overlay.innerText = "Keep front knee bent — "+remain+"s";
          else if(!r.backLegStraight) overlay.innerText = "Straighten back leg — "+remain+"s";
          else if(!r.hipsFacing) overlay.innerText = "Square hips forward — "+remain+"s";
          else if(!r.armsUp)     overlay.innerText = "Keep arms raised — "+remain+"s";
          else                   overlay.innerText = "⚔️ Warrior I — Hold… "+remain+"s";

          scoreText.innerText = "Holding";
          if(elapsed>HOLD_TIME){
            state="done";
            scoreText.innerText = "Complete!";
            speak("Excellent Warrior One. You are a true warrior!");
          }

        } else if(state==="done"){
          overlay.innerText = "⚔️ Warrior I Complete! Strong and grounded!";
        }
      }

      function drawPose(landmarks){
        if(!landmarks||landmarks.length===0) return;
        const connections = [[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],[23,25],[25,27],[24,26],[26,28]];

        ctx.save();
        ctx.translate(canvas.width,0); ctx.scale(-1,1);

        // Base skeleton
        ctx.strokeStyle="#ff7c38"; ctx.lineWidth=3;
        connections.forEach(([s,e])=>{
          if(landmarks[s]&&landmarks[e]){
            ctx.beginPath();
            ctx.moveTo(landmarks[s].x*canvas.width, landmarks[s].y*canvas.height);
            ctx.lineTo(landmarks[e].x*canvas.width, landmarks[e].y*canvas.height);
            ctx.stroke();
          }
        });

        // Front leg (left) — yellow
        ctx.strokeStyle="#ffe138"; ctx.lineWidth=5;
        [[23,25],[25,27]].forEach(([s,e])=>{
          if(landmarks[s]&&landmarks[e]){
            ctx.beginPath();
            ctx.moveTo(landmarks[s].x*canvas.width, landmarks[s].y*canvas.height);
            ctx.lineTo(landmarks[e].x*canvas.width, landmarks[e].y*canvas.height);
            ctx.stroke();
          }
        });

        // Back leg (right) — cyan
        ctx.strokeStyle="#38d1ff"; ctx.lineWidth=5;
        [[24,26],[26,28]].forEach(([s,e])=>{
          if(landmarks[s]&&landmarks[e]){
            ctx.beginPath();
            ctx.moveTo(landmarks[s].x*canvas.width, landmarks[s].y*canvas.height);
            ctx.lineTo(landmarks[e].x*canvas.width, landmarks[e].y*canvas.height);
            ctx.stroke();
          }
        });

        // Arms — white
        ctx.strokeStyle="#ffffff"; ctx.lineWidth=4;
        [[11,13],[13,15],[12,14],[14,16]].forEach(([s,e])=>{
          if(landmarks[s]&&landmarks[e]){
            ctx.beginPath();
            ctx.moveTo(landmarks[s].x*canvas.width, landmarks[s].y*canvas.height);
            ctx.lineTo(landmarks[e].x*canvas.width, landmarks[e].y*canvas.height);
            ctx.stroke();
          }
        });

        // Joints
        ctx.fillStyle="#ff4f4f";
        landmarks.forEach(lm=>{
          if(lm&&lm.x&&lm.y){
            ctx.beginPath();
            ctx.arc(lm.x*canvas.width, lm.y*canvas.height, 5, 0, 2*Math.PI);
            ctx.fill();
          }
        });
        ctx.restore();
      }

      function onResults(results){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        if(results.image) ctx.drawImage(results.image,0,0,canvas.width,canvas.height);
        if(results.poseLandmarks&&results.poseLandmarks.length>0){
          drawPose(results.poseLandmarks);
          coach(results.poseLandmarks);
        } else {
          overlay.innerText = "No pose detected – step back & ensure good lighting";
        }
      }

      if(typeof Pose==='undefined'){
        overlay.innerText="MediaPipe Pose library failed to load"; return;
      }

      const pose = new Pose({ locateFile: f=>`https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
      pose.setOptions({ modelComplexity:1, smoothLandmarks:true, minDetectionConfidence:0.5, minTrackingConfidence:0.5 });
      pose.onResults(onResults);

      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video:{ width:700, height:520, facingMode:"user" } });
      } catch(err){
        overlay.innerText = "Webcam access denied – please allow camera permission";
        document.getElementById("cam-btn").disabled=false;
        document.getElementById("cam-btn").innerText="Start Webcam";
        return;
      }

      video.srcObject = stream;
      await video.play();
      overlay.innerText = "Detecting pose…";

      if(typeof Camera!=='undefined'){
        const camera = new Camera(video,{
          onFrame: async()=>{ await pose.send({image:video}); },
          width:700, height:520
        });
        camera.start();
      } else {
        async function loop(){
          if(!video.paused&&!video.ended){ try{ await pose.send({image:video}); }catch(e){} }
          requestAnimationFrame(loop);
        }
        loop();
      }
    }
  </script>
</body>
</html>
